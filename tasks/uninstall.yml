---
- name: Check existence of Ergo systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ ergo_identifier }}.service"
  register: ergo_service_stat

- name: Uninstall Ergo systemd services and files
  when: ergo_service_stat.stat.exists | bool
  block:
    - name: Ensure Ergo systemd service is stopped
      ansible.builtin.service:
        name: "{{ ergo_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Ergo systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ ergo_identifier }}.service"
        state: absent

    - name: Ensure Ergo support files do not exist
      ansible.builtin.file:
        path: "{{ ergo_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Ergo image source files path does not exist
      ansible.builtin.file:
        path: "{{ ergo_container_image_self_build_src_files_path }}"
        state: absent

    - name: Ensure Ergo local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ ergo_data_path }}"
      register: ergo_data_path_deletion_result
      changed_when: ergo_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Ergo base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ ergo_base_path }}"
      register: ergo_base_path_deletion_result
      changed_when: ergo_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Ergo container network does not exist
      when: ergo_container_network_deletion_enabled
      block:
        - name: Ensure Ergo container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ ergo_container_network }}"
            state: absent
          register: ergo_network_deletion_result

        - name: Ensure Ergo container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ ergo_container_network }}
          register: ergo_network_deletion_result
          changed_when: ergo_container_network in ergo_network_deletion_result.stdout

- name: Check existence of Ergo local data path
  ansible.builtin.stat:
    path: "{{ ergo_data_path }}"
  register: ergo_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Notify if Ergo local data remains
  when: ergo_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Ergo instance has been removed, some old data remains in `" + ergo_data_path + "`. Feel free to delete it."
        ]
      }}
